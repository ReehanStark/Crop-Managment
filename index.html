<script>
let crops = [
  { name: "Wheat", field: "Field A", health: 87, area: 12 },
  { name: "Corn", field: "Field B", health: 92, area: 8 },
];

let tasks = [
  { type: "irrigation", field: "Field A", done: false },
  { type: "fertilization", field: "Field B", done: false },
  { type: "pest", field: "Field C", done: false, pestPercent: 0 },
];

function showTab(tab) {
  document.getElementById("dashboard").classList.add("hidden");
  document.getElementById("crops").classList.add("hidden");
  document.getElementById("tasks").classList.add("hidden");

  document.getElementById(tab).classList.remove("hidden");

  document.querySelectorAll("nav button").forEach(btn => btn.classList.remove("active"));
  document.getElementById("btn-" + tab).classList.add("active");
}

function showMessage(text) {
  const box = document.getElementById("messageBox");
  box.innerHTML = "✅ " + text;
  box.classList.remove("hidden");

  setTimeout(() => {
    box.classList.add("hidden");
  }, 3000);
}

function updateDashboard() {
  const totalArea = crops.reduce((a,c) => a + c.area, 0);
  const avgHealth = Math.round(crops.reduce((a,c) => a + c.health, 0) / crops.length);
  const pending = tasks.filter(t => !t.done).length;

  document.getElementById("totalArea").innerText = totalArea + " ha";
  document.getElementById("avgHealth").innerText = avgHealth + "%";
  document.getElementById("pendingTasks").innerText = pending;

  document.getElementById("date").innerText = new Date().toDateString();
}

function renderCrops() {
  const container = document.getElementById("cropList");
  container.innerHTML = "";
  crops.forEach(crop => {
    container.innerHTML += `
      <div class="card">
        <h3>${crop.name}</h3>
        <p>${crop.field}</p>
        <p>Health: ${crop.health}%</p>
      </div>
    `;
  });
}

function renderTasks() {
  const container = document.getElementById("taskList");
  container.innerHTML = "";
  tasks.forEach((t,index) => {

    let label = "";
    if(t.type === "irrigation") label = "💧 Irrigation – " + t.field;
    if(t.type === "fertilization") label = "🌱 Fertilization – " + t.field;
    if(t.type === "pest") label = "🐛 Pest Inspection – " + t.field;

    container.innerHTML += `
      <div class="card">
        <input type="checkbox" ${t.done ? "checked" : ""} 
        onchange="toggleTask(${index})">
        ${label}
      </div>
    `;
  });
}

function toggleTask(index) {
  const task = tasks[index];
  task.done = !task.done;

  if(task.done) {
    if(task.type === "irrigation") {
      showMessage("Irrigation completed successfully.");
    }

    if(task.type === "fertilization") {
      showMessage("Fertilization completed successfully.");
    }

    if(task.type === "pest") {
      // Random pest detection (0–40%)
      const pest = Math.floor(Math.random() * 41);
      task.pestPercent = pest;

      if(pest > 0) {
        showMessage("Pest inspection done. Pest detected: " + pest + "%");
      } else {
        showMessage("Pest inspection done. No pests found.");
      }
    }
  }

  renderTasks();
  updateDashboard();
}

function addCrop() {
  const name = document.getElementById("cropName").value;
  const field = document.getElementById("cropField").value;

  if(!name || !field) return alert("Fill all fields");

  crops.push({
    name,
    field,
    health: 75,
    area: 5
  });

  document.getElementById("cropName").value = "";
  document.getElementById("cropField").value = "";

  renderCrops();
  updateDashboard();
}

updateDashboard();
renderCrops();
renderTasks();
</script>
