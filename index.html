<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agrovia - Advanced Crop Management</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: linear-gradient(to bottom, #0b1f0b, #071407);
  background-attachment: fixed;
  color: #e2e8d5;
}

header {
  background: rgba(13,26,13,0.9);
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h2 {
  color: #4ade80;
  margin: 0;
}

nav button {
  margin-left: 10px;
  padding: 6px 14px;
  background: transparent;
  border: 1px solid #1f3a1f;
  color: #6b9f71;
  cursor: pointer;
  border-radius: 6px;
}

nav button.active {
  background: #16a34a33;
  color: #4ade80;
}

.container {
  padding: 30px;
}

.card {
  background: rgba(13,26,13,0.9);
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
  box-shadow: 0 0 10px rgba(0,255,100,0.1);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.hidden {
  display: none;
}

.progress {
  background: #1f3a1f;
  border-radius: 20px;
  overflow: hidden;
  height: 20px;
  margin-top: 10px;
}

.progress-bar {
  height: 100%;
  background: linear-gradient(to right, #16a34a, #4ade80);
  text-align: center;
  color: black;
  font-size: 12px;
  transition: width 0.5s ease;
}

#messageBox {
  background: #123312;
  border: 1px solid #16a34a;
  color: #4ade80;
}
</style>
</head>

<body>

<header>
  <h2>🌾 AGROVIA</h2>
  <nav>
    <button onclick="showTab('dashboard')" id="btn-dashboard" class="active">Dashboard</button>
    <button onclick="showTab('tasks')" id="btn-tasks">Field Management</button>
  </nav>
</header>

<div class="container">

<div id="messageBox" class="card hidden"></div>

<!-- DASHBOARD -->
<div id="dashboard">
  <h1>Interactive Dashboard</h1>
  <p id="date"></p>

  <div id="fieldHealth"></div>

  <div class="card">
    <h2 id="averageHealth"></h2>
    <p>Average Farm Health</p>
  </div>
</div>

<!-- FIELD MANAGEMENT -->
<div id="tasks" class="hidden">
  <h1>Field Operations</h1>
  <div id="taskList"></div>
</div>

</div>

<script>

let fields = [
  { name: "Field A", health: 85 },
  { name: "Field B", health: 90 },
  { name: "Field C", health: 78 }
];

function showTab(tab) {
  document.getElementById("dashboard").classList.add("hidden");
  document.getElementById("tasks").classList.add("hidden");
  document.getElementById(tab).classList.remove("hidden");

  document.querySelectorAll("nav button").forEach(btn => btn.classList.remove("active"));
  document.getElementById("btn-" + tab).classList.add("active");
}

function showMessage(text) {
  const box = document.getElementById("messageBox");
  box.innerHTML = "✅ " + text;
  box.classList.remove("hidden");
  setTimeout(() => box.classList.add("hidden"), 3000);
}

function updateDashboard() {
  const container = document.getElementById("fieldHealth");
  container.innerHTML = "";

  let total = 0;

  fields.forEach(field => {
    total += field.health;

    container.innerHTML += `
      <div class="card">
        <h3>${field.name}</h3>
        <div class="progress">
          <div class="progress-bar" style="width:${field.health}%">
            ${field.health}%
          </div>
        </div>
      </div>
    `;
  });

  const avg = Math.round(total / fields.length);
  document.getElementById("averageHealth").innerText = avg + "%";
  document.getElementById("date").innerText = new Date().toDateString();
}

function renderTasks() {
  const container = document.getElementById("taskList");
  container.innerHTML = "";

  fields.forEach((field, index) => {
    container.innerHTML += `
      <div class="card">
        <h3>${field.name}</h3>
        <button onclick="irrigate(${index})">💧 Irrigation</button>
        <button onclick="fertilize(${index})">🌱 Fertilization</button>
        <button onclick="inspectPest(${index})">🐛 Pest Inspection</button>
      </div>
    `;
  });
}

function irrigate(index) {
  fields[index].health = Math.min(100, fields[index].health + 5);
  showMessage("Irrigation completed successfully for " + fields[index].name);
  updateDashboard();
}

function fertilize(index) {
  fields[index].health = Math.min(100, fields[index].health + 7);
  showMessage("Fertilization completed successfully for " + fields[index].name);
  updateDashboard();
}

function inspectPest(index) {
  const pest = Math.floor(Math.random() * 41); // 0–40%

  if(pest > 0) {
    fields[index].health = Math.max(30, fields[index].health - Math.floor(pest/5));
    showMessage("Pest inspection done for " + fields[index].name +
      ". Pest detected: " + pest + "%");
  } else {
    showMessage("Pest inspection done for " + fields[index].name +
      ". No pests found.");
  }

  updateDashboard();
}

updateDashboard();
renderTasks();

</script>

</body>
</html>
